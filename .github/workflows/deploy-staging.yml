name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Container Apps
        env:
          AZURE_RESOURCE_GROUP: NemoSyn
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
          AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
          AZURE_CONTAINERAPP_ENV: ${{ vars.AZURE_CONTAINERAPP_ENV || 'nemosyn-env' }}
          AZURE_WEB_APP_NAME: ${{ vars.AZURE_WEB_APP_NAME || 'nemosyn-web' }}
          AZURE_WORKER_APP_NAME: ${{ vars.AZURE_WORKER_APP_NAME || 'nemosyn-worker' }}
          AZURE_REDIS_APP_NAME: ${{ vars.AZURE_REDIS_APP_NAME || 'nemosyn-redis' }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          MNEMOSYNE_SETTINGS_ENCRYPTION_KEY: ${{ secrets.MNEMOSYNE_SETTINGS_ENCRYPTION_KEY }}
          MNEMOSYNE_EMBEDDING_MODEL: ${{ vars.MNEMOSYNE_EMBEDDING_MODEL || 'gemini-embedding-001' }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: bash infra/deploy-azure-container-apps.sh
